# =========================================================
# TASK-023 — AlertManager با Telegram receiver
# =========================================================
global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@findash.ir'
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram'
  routes:
    - match:
        severity: critical
      receiver: 'telegram'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'telegram'
      repeat_interval: 6h

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message: |
          🚨 *{{ .GroupLabels.alertname }}*
          *شدت:* {{ .GroupLabels.severity }}
          {{ range .Alerts }}
          📋 {{ .Annotations.summary }}
          🔍 {{ .Annotations.description }}
          {{ end }}
        parse_mode: 'Markdown'
        send_resolved: true

  - name: 'null'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
